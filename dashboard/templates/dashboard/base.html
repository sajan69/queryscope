<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}QueryScope{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
      --sql-key: #79c0ff;
    }
    body {
      font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header a { color: var(--accent); text-decoration: none; }
    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .panel {
      background: var(--panel);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .panel h2 { margin-top: 0; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    label { display: inline-flex; align-items: center; gap: 0.35rem; margin-right: 1rem; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input[type="number"], input[type="text"], select {
      background: #0d1117;
      border: 1px solid #30363d;
      color: var(--text);
      border-radius: 6px;
      padding: 0.35rem 0.5rem;
    }
    button, .btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: #21262d; color: var(--text); border: 1px solid #30363d; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .metric {
      background: #0d1117;
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      border: 1px solid #30363d;
    }
    .metric .k { font-size: 0.75rem; color: var(--muted); }
    .metric .v { font-size: 1.35rem; font-weight: 700; }
    .metric .v.warn { color: var(--warn); }
    .metric .v.ok { color: var(--accent); }
    pre.sql {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.72rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sql-line { padding: 0.15rem 0; border-left: 3px solid transparent; padding-left: 0.35rem; }
    .sql-line.slow { border-left-color: var(--danger); background: rgba(248, 81, 73, 0.08); }
    .sql-line.medium { border-left-color: var(--warn); background: rgba(210, 153, 34, 0.08); }
    .sql-line.fast { border-left-color: var(--accent); }
    .explain { color: #c9d1d9; }
    .htmx-indicator { opacity: 0; transition: opacity 120ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="{% url 'dashboard:index' %}">QueryScope</a></h1>
    <p style="margin:0.35rem 0 0; color: var(--muted); font-size: 0.9rem;">Django ORM profiling dashboard</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p style="margin:0.35rem 0 0; color: var(--muted); font-size: 0.9rem; text-align: center;">© 2026 Sajan Adhikari. All rights reserved.</p>
  </footer>
</body>
</html>
